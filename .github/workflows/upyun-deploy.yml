name: 🚀 自动部署前端到又拍云

on:
  push:
    branches:
      - master
    paths:
      - 'wwwroot/index.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4 # 升级到 v4，消除那个烦人的黄字警告

      - name: 🛠️ 安装又拍云官方 CLI (upx)
        run: |
          wget https://github.com/upyun/upx/releases/download/v0.4.9/upx_0.4.9_linux_amd64.tar.gz
          tar -zxf upx_0.4.9_linux_amd64.tar.gz
          sudo mv upx /usr/local/bin/upx
          sudo chmod +x /usr/local/bin/upx

      - name: ☁️ 登录并上传至又拍云
        run: |
          upx login ${{ secrets.UPYUN_SERVICE }} ${{ secrets.UPYUN_OPERATOR }} ${{ secrets.UPYUN_PASSWORD }}
          upx put wwwroot/index.html /index.html
          
      - name: 刷新又拍云CDN缓存
        run: |
          curl -X POST "https://purge.upyun.com/purge/" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.UPYUN_OPERATOR }}:${{ secrets.UPYUN_PASSWORD }}" \
            -d '{"urls":"https://guzhicdn.21212121.xyz/index.html"}'
