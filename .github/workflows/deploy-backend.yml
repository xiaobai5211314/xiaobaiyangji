name: 部署小白养基后端

on:
  push:
    branches:
       - master
       - gpt-two
       - wechatapp
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "appsettings*.json"
      - "wwwroot/**"
      - "tools/x_tweets_fetcher/**"
      - ".github/workflows/deploy-backend.yml"
      - ".github/server/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guzhi-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      APP_DIR: /www/wwwroot/小白养基
      SERVICE_NAME: guzhi-assistant.service
      PORT: "7084"
      REMOTE_PACKAGE: /home/deploy/guzhi_release.tar.gz
      REMOTE_TRANSLATION_CONFIG: /home/deploy/guzhi_translation_secrets.json
      REMOTE_TMP_DIR: /home/deploy/guzhi_release_unpack
      CONTROL_SCRIPT: /usr/local/sbin/guzhi-deploy-control
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 缓存 NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 查找项目文件
        shell: bash
        run: |
          set -Eeuo pipefail
          CSPROJ="$(find . -maxdepth 4 -name '*.csproj' | head -n 1)"
          if [ -z "$CSPROJ" ]; then
            echo "没找到 .csproj"
            exit 1
          fi
          echo "CSPROJ=$CSPROJ" >> "$GITHUB_ENV"
          echo "使用项目：$CSPROJ"

      - name: 还原并发布
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./publish release.tar.gz
          dotnet restore "$CSPROJ" --nologo
          dotnet publish "$CSPROJ" \
            -c Release \
            -o ./publish \
            --no-restore \
            --nologo \
            -p:UseAppHost=false \
            -p:AssemblyName=小白养基

          MAIN_DLL="$(find ./publish -maxdepth 1 -name '*.dll' | sed 's#^./publish/##' | head -n 1)"
          if [ -z "$MAIN_DLL" ]; then
            echo "发布目录里没有 dll"
            ls -lah ./publish
            exit 1
          fi

          if [ ! -f "./publish/小白养基.dll" ]; then
            echo "警告：发布目录里没有 小白养基.dll，当前 DLL：$MAIN_DLL"
          fi

          mkdir -p ./publish/tools/x_tweets_fetcher
          cp -a ./tools/x_tweets_fetcher/. ./publish/tools/x_tweets_fetcher/
          find ./publish/tools/x_tweets_fetcher -type d -name '__pycache__' -prune -exec rm -rf {} +
          find ./publish/tools/x_tweets_fetcher -type f \( -name '*.pyc' -o -name '*.db' \) -delete

          tar -cf - -C ./publish . | gzip -1 > release.tar.gz
          echo "发布包大小："
          ls -lh release.tar.gz

      - name: 配置 SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 生成腾讯翻译私有配置包
        shell: bash
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_TRANSLATE_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_TRANSLATE_SECRET_KEY }}
        run: |
          set -Eeuo pipefail
          if [ -z "$TENCENT_SECRET_ID" ] || [ -z "$TENCENT_SECRET_KEY" ]; then
            echo "缺少腾讯翻译 GitHub Secrets"
            exit 1
          fi
          umask 077
          python3 - <<'PY'
          import json
          import os

          payload = {
              "TRANSLATE_TENCENT_SECRET_ID": os.environ["TENCENT_SECRET_ID"],
              "TRANSLATE_TENCENT_SECRET_KEY": os.environ["TENCENT_SECRET_KEY"],
          }
          with open("guzhi_translation_secrets.json", "w", encoding="utf-8") as handle:
              json.dump(payload, handle)
          PY
          chmod 600 guzhi_translation_secrets.json
          echo "腾讯翻译私有配置包已生成（内容不输出）"

      - name: 上传发布包
        shell: bash
        run: |
          set -Eeuo pipefail
          scp -q -i ~/.ssh/deploy_key \
            -P "$SERVER_PORT" \
            release.tar.gz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${REMOTE_PACKAGE}"
          scp -q -i ~/.ssh/deploy_key \
            -P "$SERVER_PORT" \
            guzhi_translation_secrets.json \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${REMOTE_TRANSLATION_CONFIG}"
          rm -f guzhi_translation_secrets.json

      - name: 部署并健康检查
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF_REMOTE'
          set -Eeuo pipefail

          APP_DIR="/www/wwwroot/小白养基"
          SERVICE_NAME="guzhi-assistant.service"
          PORT="7084"
          REMOTE_PACKAGE="/home/deploy/guzhi_release.tar.gz"
          REMOTE_TRANSLATION_CONFIG="/home/deploy/guzhi_translation_secrets.json"
          TMP_DIR="/home/deploy/guzhi_release_unpack"
          CONTROL_SCRIPT="/usr/local/sbin/guzhi-deploy-control"
          trap 'rm -f "$REMOTE_TRANSLATION_CONFIG"' EXIT

          echo "======= 0. 基础检查 ======="
          whoami
          ls -lh "$REMOTE_PACKAGE"

          if [ ! -x "$CONTROL_SCRIPT" ]; then
            echo "缺少 $CONTROL_SCRIPT"
            echo "先用 root 执行 server/one-time-root-setup.sh"
            exit 1
          fi

          if ! sudo -n "$CONTROL_SCRIPT" is-active >/tmp/guzhi_service_state.txt 2>/tmp/guzhi_sudo_err.txt; then
            echo "sudo 免密控制脚本不可用。错误："
            cat /tmp/guzhi_sudo_err.txt || true
            echo "先用 root 执行 server/one-time-root-setup.sh"
            exit 1
          fi
          cat /tmp/guzhi_service_state.txt || true

          echo "======= 1. 解压发布包 ======="
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          tar -xzf "$REMOTE_PACKAGE" -C "$TMP_DIR"

          if ! find "$TMP_DIR" -maxdepth 1 -name '*.dll' | grep -q .; then
            echo "发布包里没有 dll"
            find "$TMP_DIR" -maxdepth 1 -type f -print
            exit 1
          fi
          echo "发布 DLL："
          find "$TMP_DIR" -maxdepth 1 -name '*.dll' -printf '%f\n'

          echo "======= 2. 停止服务并释放端口 ======="
          sudo -n "$CONTROL_SCRIPT" release-port

          if sudo -n "$CONTROL_SCRIPT" port-in-use; then
            echo "端口 ${PORT} 仍被占用，部署终止"
            sudo -n "$CONTROL_SCRIPT" port-info || true
            exit 1
          fi

          echo "======= 3. 覆盖线上文件 ======="
          mkdir -p "$APP_DIR"
          if [ ! -w "$APP_DIR" ]; then
            echo "$APP_DIR 不可写。请执行：chown -R deploy:deploy '$APP_DIR'"
            exit 1
          fi

          if [ -f "$APP_DIR/小白养基.dll" ]; then
            cp -f "$APP_DIR/小白养基.dll" "$APP_DIR/小白养基.dll.bak"
          fi

          rm -rf "$APP_DIR/wwwroot/v2"
          cp -a "$TMP_DIR"/. "$APP_DIR"/
          sync

          echo "线上 DLL："
          find "$APP_DIR" -maxdepth 1 -name '*.dll' -printf '%f %s bytes\n'

          echo "======= 3.2. 配置并运行推文翻译 sidecar ======="
          SIDECAR_DIR="$APP_DIR/tools/x_tweets_fetcher"
          PRIVATE_ENV="$APP_DIR/.secrets/influencer.env"
          CACHE_PATH="/var/lib/xiaobaiyangji/influencer-posts.json"
          if [ ! -f "$SIDECAR_DIR/configure_translation_env.py" ]; then
            echo "缺少 sidecar 私有配置脚本"
            exit 1
          fi
          if [ ! -f "$REMOTE_TRANSLATION_CONFIG" ]; then
            echo "缺少服务器临时翻译配置包"
            exit 1
          fi

          install -d -m 700 "$APP_DIR/.secrets"
          python3 "$SIDECAR_DIR/configure_translation_env.py" "$PRIVATE_ENV" < "$REMOTE_TRANSLATION_CONFIG"
          rm -f "$REMOTE_TRANSLATION_CONFIG"

          if [ ! -x "$SIDECAR_DIR/.venv/bin/python" ]; then
            python3 -m venv "$SIDECAR_DIR/.venv"
          fi
          "$SIDECAR_DIR/.venv/bin/pip" install --disable-pip-version-check --quiet -r "$SIDECAR_DIR/requirements.txt"
          if ! "$SIDECAR_DIR/.venv/bin/python" "$SIDECAR_DIR/fetch_posts.py" >/tmp/guzhi_influencer_sync.log 2>&1; then
            echo "推文 sidecar 同步失败："
            tail -n 30 /tmp/guzhi_influencer_sync.log || true
            exit 1
          fi

          python3 - "$CACHE_PATH" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              payload = json.load(handle)
          items = payload.get("items", []) if isinstance(payload, dict) else []
          translated = sum(1 for item in items[:20] if item.get("translationStatus") == "success" and item.get("translatedText"))
          print(f"推文翻译缓存验证：items={min(len(items), 20)} translated={translated}")
          if translated < 1:
              raise SystemExit("推文缓存没有成功译文")
          PY

          echo "======= 3.5. 数据库迁移 ======="
          APPSETTINGS="$APP_DIR/appsettings.Production.json"
          if [ -f "$APPSETTINGS" ]; then
            DB_HOST=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Server=')][0])" 2>/dev/null || echo "127.0.0.1")
            DB_NAME=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Database=')][0])" 2>/dev/null || echo "guzhi")
            DB_USER=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('User=')][0])" 2>/dev/null || echo "guzhi")
            DB_PASS=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Password=')][0])" 2>/dev/null || echo "guzhi")
            echo "执行 DDL 迁移 (db=$DB_NAME)..."
            mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SET @c=(SELECT COUNT(1) FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='FundRecords' AND COLUMN_NAME='NavDate'); SET @s=IF(@c=0,'ALTER TABLE FundRecords ADD COLUMN NavDate VARCHAR(20) NULL','SELECT 1'); PREPARE stmt FROM @s; EXECUTE stmt; DEALLOCATE PREPARE stmt; SET @c=(SELECT COUNT(1) FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='FundRecords' AND COLUMN_NAME='Nav'); SET @s=IF(@c=0,'ALTER TABLE FundRecords ADD COLUMN Nav DOUBLE NULL','SELECT 1'); PREPARE stmt FROM @s; EXECUTE stmt; DEALLOCATE PREPARE stmt; SET @c=(SELECT COUNT(1) FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='FundRecords' AND COLUMN_NAME='Source'); SET @s=IF(@c=0,'ALTER TABLE FundRecords ADD COLUMN Source VARCHAR(50) NULL','SELECT 1'); PREPARE stmt FROM @s; EXECUTE stmt; DEALLOCATE PREPARE stmt; SET @c=(SELECT COUNT(1) FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='FundRecords' AND COLUMN_NAME='IsOfficial'); SET @s=IF(@c=0,'ALTER TABLE FundRecords ADD COLUMN IsOfficial TINYINT(1) NOT NULL DEFAULT 0','SELECT 1'); PREPARE stmt FROM @s; EXECUTE stmt; DEALLOCATE PREPARE stmt; SET @i=(SELECT COUNT(1) FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='FundRecords' AND INDEX_NAME='IX_FundRecord_Code_Official_NavDate'); SET @s=IF(@i=0,'CREATE INDEX IX_FundRecord_Code_Official_NavDate ON FundRecords (FundCode, IsOfficial, NavDate)','SELECT 1'); PREPARE stmt FROM @s; EXECUTE stmt; DEALLOCATE PREPARE stmt;" 2>&1 || echo "DDL 迁移失败（可能已存在）"
            echo "DDL 迁移完成"
          else
            echo "未找到 $APPSETTINGS，跳过 DDL 迁移"
          fi

          echo "======= 4. 启动服务 ======="
          sudo -n "$CONTROL_SCRIPT" daemon-reload
          sudo -n "$CONTROL_SCRIPT" enable
          sudo -n "$CONTROL_SCRIPT" start

          echo "======= 5. 健康检查 ======="
          OK=""
          for i in $(seq 1 10); do
            CODE="$(curl -sS --max-time 3 -o /tmp/guzhi_health.json -w "%{http_code}" "http://127.0.0.1:${PORT}/api/health" || true)"
            if [ "$CODE" = "200" ]; then
              OK="1"
              echo "健康检查通过：/api/health"
              head -c 500 /tmp/guzhi_health.json || true
              echo ""
              break
            fi
            echo "第 ${i} 次等待，状态码：${CODE}"
            sleep 1
          done

          if [ -z "$OK" ]; then
            echo "健康检查失败，服务状态："
            sudo -n "$CONTROL_SCRIPT" status || true
            echo "最近日志："
            sudo -n "$CONTROL_SCRIPT" logs 200 || true
            exit 1
          fi

          echo "======= 6. 外网 API 简测 ======="
          curl -sS --max-time 5 -I "https://guzhi.21212121.xyz/api/fund/sectors" || true

          echo "======= 部署完成 ======="
          EOF_REMOTE
