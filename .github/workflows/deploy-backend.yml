name: 部署估值助手后端

on:
  push:
    branches:
      - master
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "appsettings*.json"
      - "wwwroot/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guzhi-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      APP_DIR: /www/wwwroot/估值助手
      SERVICE_NAME: guzhi-assistant.service
      PORT: "7084"
      REMOTE_PACKAGE: /home/deploy/guzhi_release.tar.gz
      REMOTE_TMP_DIR: /home/deploy/guzhi_release_unpack
      CONTROL_SCRIPT: /usr/local/sbin/guzhi-deploy-control
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 缓存 NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 查找项目文件
        shell: bash
        run: |
          set -Eeuo pipefail
          CSPROJ="$(find . -maxdepth 3 -name '*.csproj' | head -n 1)"
          if [ -z "$CSPROJ" ]; then
            echo "没找到 .csproj"
            exit 1
          fi
          echo "CSPROJ=$CSPROJ" >> "$GITHUB_ENV"
          echo "使用项目：$CSPROJ"

      - name: 还原并发布
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./publish release.tar.gz
          dotnet restore "$CSPROJ" --nologo
          dotnet publish "$CSPROJ" \
            -c Release \
            -o ./publish \
            --no-restore \
            --nologo \
            -p:UseAppHost=false

          if [ ! -f "./publish/估值助手.dll" ]; then
            echo "发布目录里没有 估值助手.dll"
            find ./publish -maxdepth 1 -name "*.dll" -print
            exit 1
          fi

          tar -cf - -C ./publish . | gzip -1 > release.tar.gz
          ls -lh release.tar.gz

      - name: 配置 SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 上传发布包
        shell: bash
        run: |
          set -Eeuo pipefail
          scp -q -i ~/.ssh/deploy_key \
            -P "$SERVER_PORT" \
            release.tar.gz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${REMOTE_PACKAGE}"

      - name: 部署并快速健康检查
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF_REMOTE'
          set -Eeuo pipefail

          APP_DIR="/www/wwwroot/估值助手"
          SERVICE_NAME="guzhi-assistant.service"
          PORT="7084"
          REMOTE_PACKAGE="/home/deploy/guzhi_release.tar.gz"
          TMP_DIR="/home/deploy/guzhi_release_unpack"
          CONTROL_SCRIPT="/usr/local/sbin/guzhi-deploy-control"

          echo "1. 解压发布包"
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          tar -xzf "$REMOTE_PACKAGE" -C "$TMP_DIR"

          if [ ! -f "$TMP_DIR/估值助手.dll" ]; then
            echo "发布包里没有 估值助手.dll"
            exit 1
          fi

          echo "2. 停止服务"
          sudo -n "$CONTROL_SCRIPT" stop 2>/dev/null || sudo -n systemctl stop "$SERVICE_NAME" || true

          for i in 1 2 3 4 5 6; do
            if ! sudo -n ss -lntp | grep -q ":${PORT}"; then
              break
            fi
            sleep 0.5
          done

          if sudo -n ss -lntp | grep -q ":${PORT}"; then
            PID="$(sudo -n ss -lntp | grep ":${PORT}" | sed -n 's/.*pid=\([0-9]*\).*/\1/p' | head -n 1)"
            if [ -n "$PID" ]; then
              echo "端口仍被占用，kill $PID"
              sudo -n kill -9 "$PID" || true
            fi
          fi

          echo "3. 覆盖线上文件"
          mkdir -p "$APP_DIR"
          if [ ! -w "$APP_DIR" ]; then
            echo "$APP_DIR 不可写。请先修复 deploy 用户权限。"
            exit 1
          fi

          # 只保留最近一次 DLL 备份，避免备份越积越多。
          if [ -f "$APP_DIR/估值助手.dll" ]; then
            cp -f "$APP_DIR/估值助手.dll" "$APP_DIR/估值助手.dll.bak"
          fi
          cp -a "$TMP_DIR"/. "$APP_DIR"/

          echo "4. 启动服务"
          sudo -n "$CONTROL_SCRIPT" start 2>/dev/null || sudo -n systemctl start "$SERVICE_NAME"

          echo "5. 快速健康检查"
          OK=""
          for i in $(seq 1 24); do
            CODE="$(curl -sS --max-time 2 -o /tmp/guzhi_ping.json -w "%{http_code}" "http://127.0.0.1:${PORT}/api/ping" || true)"
            if [ "$CODE" = "200" ]; then
              OK="1"
              cat /tmp/guzhi_ping.json || true
              echo ""
              break
            fi
            sleep 0.5
          done

          if [ -z "$OK" ]; then
            echo "服务未通过 /api/ping 健康检查，最近日志："
            sudo -n "$CONTROL_SCRIPT" logs 120 2>/dev/null || sudo -n journalctl -u "$SERVICE_NAME" -n 120 --no-pager || true
            exit 1
          fi

          echo "部署完成"
          EOF_REMOTE
