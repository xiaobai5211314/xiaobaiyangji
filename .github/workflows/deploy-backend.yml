name: 部署小白养基后端

on:
  push:
    branches:
       - master
       - gpt-two
       - wechatapp
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "appsettings*.json"
      - "wwwroot/**"
      - ".github/workflows/deploy-backend.yml"
      - ".github/server/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guzhi-backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      APP_DIR: /www/wwwroot/小白养基
      SERVICE_NAME: guzhi-assistant.service
      PORT: "7084"
      REMOTE_PACKAGE: /home/deploy/guzhi_release.tar.gz
      REMOTE_TMP_DIR: /home/deploy/guzhi_release_unpack
      CONTROL_SCRIPT: /usr/local/sbin/guzhi-deploy-control
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 缓存 NuGet
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/Directory.Packages.props', '**/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 查找项目文件
        shell: bash
        run: |
          set -Eeuo pipefail
          CSPROJ="$(find . -maxdepth 4 -name '*.csproj' | head -n 1)"
          if [ -z "$CSPROJ" ]; then
            echo "没找到 .csproj"
            exit 1
          fi
          echo "CSPROJ=$CSPROJ" >> "$GITHUB_ENV"
          echo "使用项目：$CSPROJ"

      - name: 还原并发布
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf ./publish release.tar.gz
          dotnet restore "$CSPROJ" --nologo
          dotnet publish "$CSPROJ" \
            -c Release \
            -o ./publish \
            --no-restore \
            --nologo \
            -p:UseAppHost=false \
            -p:AssemblyName=小白养基

          MAIN_DLL="$(find ./publish -maxdepth 1 -name '*.dll' | sed 's#^./publish/##' | head -n 1)"
          if [ -z "$MAIN_DLL" ]; then
            echo "发布目录里没有 dll"
            ls -lah ./publish
            exit 1
          fi

          if [ ! -f "./publish/小白养基.dll" ]; then
            echo "警告：发布目录里没有 小白养基.dll，当前 DLL：$MAIN_DLL"
          fi

          tar -cf - -C ./publish . | gzip -1 > release.tar.gz
          echo "发布包大小："
          ls -lh release.tar.gz

      - name: 配置 SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: 上传发布包
        shell: bash
        run: |
          set -Eeuo pipefail
          scp -q -i ~/.ssh/deploy_key \
            -P "$SERVER_PORT" \
            release.tar.gz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${REMOTE_PACKAGE}"

      - name: 部署并健康检查
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'EOF_REMOTE'
          set -Eeuo pipefail

          APP_DIR="/www/wwwroot/小白养基"
          SERVICE_NAME="guzhi-assistant.service"
          PORT="7084"
          REMOTE_PACKAGE="/home/deploy/guzhi_release.tar.gz"
          TMP_DIR="/home/deploy/guzhi_release_unpack"
          CONTROL_SCRIPT="/usr/local/sbin/guzhi-deploy-control"

          echo "======= 0. 基础检查 ======="
          whoami
          ls -lh "$REMOTE_PACKAGE"

          if [ ! -x "$CONTROL_SCRIPT" ]; then
            echo "缺少 $CONTROL_SCRIPT"
            echo "先用 root 执行 server/one-time-root-setup.sh"
            exit 1
          fi

          if ! sudo -n "$CONTROL_SCRIPT" is-active >/tmp/guzhi_service_state.txt 2>/tmp/guzhi_sudo_err.txt; then
            echo "sudo 免密控制脚本不可用。错误："
            cat /tmp/guzhi_sudo_err.txt || true
            echo "先用 root 执行 server/one-time-root-setup.sh"
            exit 1
          fi
          cat /tmp/guzhi_service_state.txt || true

          echo "======= 1. 解压发布包 ======="
          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR"
          tar -xzf "$REMOTE_PACKAGE" -C "$TMP_DIR"

          if ! find "$TMP_DIR" -maxdepth 1 -name '*.dll' | grep -q .; then
            echo "发布包里没有 dll"
            find "$TMP_DIR" -maxdepth 1 -type f -print
            exit 1
          fi
          echo "发布 DLL："
          find "$TMP_DIR" -maxdepth 1 -name '*.dll' -printf '%f\n'

          echo "======= 2. 停止服务并释放端口 ======="
          sudo -n "$CONTROL_SCRIPT" release-port

          if sudo -n "$CONTROL_SCRIPT" port-in-use; then
            echo "端口 ${PORT} 仍被占用，部署终止"
            sudo -n "$CONTROL_SCRIPT" port-info || true
            exit 1
          fi

          echo "======= 3. 覆盖线上文件 ======="
          mkdir -p "$APP_DIR"
          if [ ! -w "$APP_DIR" ]; then
            echo "$APP_DIR 不可写。请执行：chown -R deploy:deploy '$APP_DIR'"
            exit 1
          fi

          if [ -f "$APP_DIR/小白养基.dll" ]; then
            cp -f "$APP_DIR/小白养基.dll" "$APP_DIR/小白养基.dll.bak"
          fi

          cp -a "$TMP_DIR"/. "$APP_DIR"/
          sync

          echo "线上 DLL："
          find "$APP_DIR" -maxdepth 1 -name '*.dll' -printf '%f %s bytes\n'

          echo "======= 3.5. 数据库迁移 ======="
          APPSETTINGS="$APP_DIR/appsettings.Production.json"
          if [ -f "$APPSETTINGS" ]; then
            DB_HOST=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Server=')][0])" 2>/dev/null || echo "127.0.0.1")
            DB_NAME=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Database=')][0])" 2>/dev/null || echo "guzhi")
            DB_USER=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('User=')][0])" 2>/dev/null || echo "guzhi")
            DB_PASS=$(python3 -c "import json; c=json.load(open('$APPSETTINGS'))['ConnectionStrings']['DefaultConnection']; print([p.split('=',1)[1] for p in c.split(';') if p.strip().startswith('Password=')][0])" 2>/dev/null || echo "guzhi")
            echo "执行 DDL 迁移 (db=$DB_NAME)..."
            mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "
              ALTER TABLE FundRecords ADD COLUMN IF NOT EXISTS NavDate VARCHAR(20) NULL;
              ALTER TABLE FundRecords ADD COLUMN IF NOT EXISTS Nav DOUBLE NULL;
              ALTER TABLE FundRecords ADD COLUMN IF NOT EXISTS Source VARCHAR(50) NOT NULL DEFAULT '';
              ALTER TABLE FundRecords ADD COLUMN IF NOT EXISTS IsOfficial TINYINT(1) NOT NULL DEFAULT 0;
            " 2>&1 || echo "DDL 列迁移跳过（可能已存在）"
            mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "
              SET @idx_ok = (SELECT COUNT(1) FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'FundRecords' AND INDEX_NAME = 'IX_FundRecord_Code_Official_NavDate');
              SELECT IF(@idx_ok = 0, '需要创建索引', '索引已存在') AS idx_status;
            " 2>&1 || true
            mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "
              CREATE INDEX IF NOT EXISTS IX_FundRecord_Code_Official_NavDate ON FundRecords (FundCode, IsOfficial, NavDate);
            " 2>&1 || echo "DDL 索引迁移跳过（可能已存在）"
            echo "DDL 迁移完成"
          else
            echo "未找到 $APPSETTINGS，跳过 DDL 迁移"
          fi

          echo "======= 4. 启动服务 ======="
          sudo -n "$CONTROL_SCRIPT" daemon-reload
          sudo -n "$CONTROL_SCRIPT" enable
          sudo -n "$CONTROL_SCRIPT" start

          echo "======= 5. 健康检查 ======="
          OK=""
          for i in $(seq 1 10); do
            CODE="$(curl -sS --max-time 3 -o /tmp/guzhi_health.json -w "%{http_code}" "http://127.0.0.1:${PORT}/api/health" || true)"
            if [ "$CODE" = "200" ]; then
              OK="1"
              echo "健康检查通过：/api/health"
              head -c 500 /tmp/guzhi_health.json || true
              echo ""
              break
            fi
            echo "第 ${i} 次等待，状态码：${CODE}"
            sleep 1
          done

          if [ -z "$OK" ]; then
            echo "健康检查失败，服务状态："
            sudo -n "$CONTROL_SCRIPT" status || true
            echo "最近日志："
            sudo -n "$CONTROL_SCRIPT" logs 200 || true
            exit 1
          fi

          echo "======= 6. 外网 API 简测 ======="
          curl -sS --max-time 5 -I "https://guzhi.21212121.xyz/api/fund/sectors" || true

          echo "======= 部署完成 ======="
          EOF_REMOTE
