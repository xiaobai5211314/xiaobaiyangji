services:
  mysql:
    image: mysql:8.0
    container_name: guzhi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: guzhi
      MYSQL_USER: guzhi
      MYSQL_PASSWORD: guzhi
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - guzhi_mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: guzhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  guzhi_mysql_data: