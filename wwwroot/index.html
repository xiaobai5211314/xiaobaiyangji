<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>估值助手</title>
    <base href="/" />
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        html { background-color: #0f172a; }
        [v-cloak] { display: none !important; }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc; font-family: -apple-system, sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .header { margin: 15px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 20px; background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .control-panel { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .control-panel input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.15); color: #00e5ff; padding: 8px 15px; border-radius: 20px; outline: none; width: 140px; transition: 0.3s; }
        .btn-add { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #fff; border: none; padding: 9px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-ocr { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; border: none; padding: 9px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-ocr:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
        .btn-ocr:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
        .btn-global { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 9px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-global:hover { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); transform: translateY(-2px); }
        .btn-logout { background: transparent; color: #ff4d4f; border: 1px solid #ff4d4f; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .fund-list-container { margin: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .fund-card { padding: 15px; border-radius: 16px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .radar-badge { background: rgba(255, 77, 79, 0.15); color: #ff4d4f; font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255, 77, 79, 0.3); animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; text-align: center; }
        .metric-item { display: flex; flex-direction: column; }
        .metric-label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
        .metric-value { font-weight: bold; }
        .modal-mask { position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .modal-input { width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        #chart-container { width: calc(100vw - 30px); height: calc(100vh - 280px); margin: 15px; box-sizing: border-box; }
        .divider { width: 1px; height: 40px; background: rgba(255,255,255,0.1); }
        .skeleton-box { background: linear-gradient(90deg, rgba(40,49,66,0.5) 25%, rgba(55,65,81,0.8) 37%, rgba(40,49,66,0.5) 63%); background-size: 400% 100%; animation: skeleton-loading 1.4s ease infinite; border-radius: 8px; }
        @keyframes skeleton-loading { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
        .toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { padding: 12px 24px; border-radius: 30px; color: #fff; font-size: 14px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; }
        .toast.success { background: rgba(16, 185, 129, 0.9); border: 1px solid #34d399; }
        .toast.error { background: rgba(239, 68, 68, 0.9); border: 1px solid #f87171; }
        .toast.info { background: rgba(56, 189, 248, 0.9); border: 1px solid #7dd3fc; }
        @keyframes slideDown { 0% { transform: translateY(-50px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @media screen and (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .control-panel { width: 100%; }
            .control-panel input { flex: 1; min-width: 90px; }
            #chart-container { height: 50vh; }
            .total-panel { flex-wrap: wrap; gap: 20px; }
            .divider { display: none; }
        }
    </style>
</head>
<body style="background-color: #0f172a;">
    <div id="app" v-cloak>
        <div class="toast-container">
            <div v-for="t in toasts" :key="t.id" :class="['toast', t.type]">{{ t.msg }}</div>
        </div>

        <div v-if="!isLoggedIn" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(15,23,42,0.8);backdrop-filter:blur(15px);z-index:999;display:flex;align-items:center;justify-content:center;">
            <div class="glass-panel" style="padding: 40px; text-align: center; width: 300px;">
                <h2 style="margin-top:0;color:#fff;">⚡ 量化指挥中心</h2>
                <input v-model="loginForm.username" type="text" placeholder="指挥官代号" style="width:100%;margin:15px 0;padding:12px;border-radius:12px
