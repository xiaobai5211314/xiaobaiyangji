<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科技军团 - Vue3 量化终端</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.staticfile.net/echarts/5.5.0/echarts.min.js"></script>
    <style>
        /* 保持炫彩玻璃风 CSS 不变 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .header {
            margin: 15px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .header h1 {
                margin: 0;
                font-size: 20px;
                background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-weight: 800;
            }

        .control-panel {
            display: flex;
            gap: 12px;
            align-items: center;
        }

            .control-panel input {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid rgba(255,255,255,0.15);
                color: #00e5ff;
                padding: 8px 15px;
                border-radius: 20px;
                outline: none;
                width: 120px;
                transition: 0.3s;
            }

        .btn-add {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout {
            background: transparent;
            color: #ff4d4f;
            border: 1px solid #ff4d4f;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        #fund-list {
            margin: 0 15px;
            padding: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .fund-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

            .fund-tag span {
                color: #4facfe;
                font-weight: bold;
            }

            .fund-tag button {
                background: rgba(255, 77, 79, 0.2);
                border: none;
                color: #ff4d4f;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
            }

        #chart-container {
            width: calc(100vw - 30px);
            height: calc(100vh - 180px);
            margin: 15px;
            box-sizing: border-box;
        }

        [v-cloak] {
            display: none !important;
        }
        /* 防止 Vue 加载前的闪烁 */

        @media screen and (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .control-panel {
                width: 100%;
                flex-wrap: wrap;
            }

                .control-panel input {
                    flex: 1;
                    min-width: 90px;
                }

            #chart-container {
                height: 50vh;
            }
        }
        /* 骨架屏心跳动画 */
        .skeleton-box {
            background: linear-gradient(90deg, rgba(40,49,66,0.5) 25%, rgba(55,65,81,0.8) 37%, rgba(40,49,66,0.5) 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0 50%;
            }
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>

        <div v-if="!isLoggedIn" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(15,23,42,0.8);backdrop-filter:blur(15px);z-index:999;display:flex;align-items:center;justify-content:center;">
            <div class="glass-panel" style="padding: 40px; text-align: center; width: 300px;">
                <h2 style="margin-top:0;background:linear-gradient(to right,#00f2fe,#4facfe);-webkit-background-clip:text;color:transparent;">⚡ Vue 量化引擎</h2>
                <input v-model="loginForm.username" type="text" placeholder="指挥官代号" style="width:100%;margin:15px 0;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;box-sizing:border-box;">
                <input v-model="loginForm.password" type="password" placeholder="安全密码" @keyup.enter="handleLogin" style="width:100%;margin-bottom:20px;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;box-sizing:border-box;">
                <div style="display:flex;gap:10px;">
                    <button @click="handleLogin" style="flex:1;padding:12px;background:linear-gradient(135deg,#00f2fe,#4facfe);border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer;">登录</button>
                    <button @click="handleRegister" style="flex:1;padding:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#4facfe;cursor:pointer;">注册</button>
                </div>
            </div>
        </div>

        <div v-else>
            <div class="header glass-panel">
                <h1>🦾 个人专属大屏 ({{ currentUser }})</h1>
                <div class="control-panel">
                    <input v-model="fundForm.code" type="text" placeholder="代码 (如 017811)">
                    <input v-model="fundForm.amount" type="number" placeholder="本金 (元)">
                    <button class="btn-add" @click="handleAddFund">+ 加仓入阵</button>
                    <button class="btn-logout" @click="handleLogout">安全撤退</button>
                </div>
            </div>

            <div id="fund-list" class="glass-panel">
                <div v-for="fund in fundsList" :key="fund.code" class="fund-tag">
                    {{ fund.name }} <span>(本金: {{ fund.amount }})</span>
                    <button @click="handleDeleteFund(fund.code, fund.name)" title="删除">✕</button>
                </div>
                <span v-if="fundsList.length === 0" style="color:#64748b; font-size:13px;">暂无阵地，请在上方添加代码</span>
            </div>

            <div v-show="isLoading" class="glass-panel" style="height: calc(100vh - 180px); margin: 15px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; gap: 20px;">
                <div class="skeleton-box" style="width: 30%; height: 30px;"></div>
                <div class="skeleton-box" style="width: 100%; height: 2px;"></div>
                <div style="display: flex; gap: 20px; height: 100%;">
                    <div class="skeleton-box" style="width: 50px; height: 100%;"></div>
                    <div class="skeleton-box" style="flex: 1; height: 100%;"></div>
                </div>
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4facfe; font-weight: bold; font-size: 18px; letter-spacing: 2px;">
                    📡 正在连接总司令部同步数据...
                </div>
            </div>

            <div v-show="!isLoading" id="chart-container" class="glass-panel" ref="chartRef"></div>
        </div>

    </div>

    <script>
        const { createApp, ref, reactive, onMounted, onUnmounted, nextTick, shallowRef } = Vue;
      
        createApp({
            setup() {
                // ========== 响应式状态库 ==========
                const isLoggedIn = ref(false);
                const currentUser = ref(localStorage.getItem('fund_username') || '');
                const fundsList = ref([]);
                const chartRef = ref(null);
                const isLoading = ref(true); // 👈 默认进入时处于加载中
                // 表单数据绑定
                const loginForm = reactive({ username: '', password: '' });
                const fundForm = reactive({ code: '', amount: '' });

                // 图表实例 (使用 shallowRef 防止 Vue 代理庞大的 ECharts 对象导致卡顿)
                const chartInstance = shallowRef(null);
                let timer = null;

                // ========== 认证系统 ==========
                const handleRegister = async () => {
                    if (!loginForm.username || !loginForm.password) return alert("账号密码为空！");
                    let fd = new FormData(); fd.append('username', loginForm.username); fd.append('password', loginForm.password);
                    const res = await fetch('/api/auth/register', { method: 'POST', body: fd });
                    if (res.ok) alert("✅ 注册成功！请登录。"); else alert("❌ 注册失败");
                };

                const handleLogin = async () => {
                    if (!loginForm.username || !loginForm.password) return alert("账号密码为空！");
                    let fd = new FormData(); fd.append('username', loginForm.username); fd.append('password', loginForm.password);
                    const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
                    if (res.ok) {
                        localStorage.setItem('fund_username', loginForm.username);
                        currentUser.value = loginForm.username;
                        isLoggedIn.value = true;
                        initDashboard(); // 登录后无刷新直接进系统
                    } else alert("❌ 账号或密码错误");
                };

                const handleLogout = () => {
                    localStorage.removeItem('fund_username');
                    isLoggedIn.value = false;
                    if (chartInstance.value) chartInstance.value.dispose();
                    if (timer) clearInterval(timer);
                };

                // ========== 业务操作 ==========
                const handleAddFund = async () => {
                    if (!fundForm.code || !fundForm.amount) return alert("请输入完整！");
                    const fd = new FormData(); fd.append('username', currentUser.value); fd.append('code', fundForm.code); fd.append('amount', fundForm.amount);
                    const res = await fetch('/api/fund/add', { method: 'POST', body: fd });
                    if (res.ok) {
                        fundForm.code = ''; fundForm.amount = ''; // 清空输入框
                        fetchData(); // 悄悄更新数据
                    }
                };

                const handleDeleteFund = async (code, name) => {
                    if (confirm(`⚠️ 确定移除 [${name}] 吗？`)) {
                        const fd = new FormData(); fd.append('username', currentUser.value); fd.append('code', code);
                        await fetch('/api/fund/delete', { method: 'POST', body: fd });
                        fetchData();
                    }
                };

                // ========== 核心引擎：平滑抓取与渲染 ==========
             const fetchData = async () => {
                    if (!currentUser.value) return;
                    try {
                        const response = await fetch(`/api/fund/today?username=${encodeURIComponent(currentUser.value)}`);
                        const apiData = await response.json();
                        fundsList.value = apiData; 
                        renderChart(apiData);
                        
                        // 👈 数据一到，瞬间关闭骨架屏，显示真实图表！
                        setTimeout(() => { isLoading.value = false; }, 300); // 加 300ms 延迟让图表渲染更平滑
                    } catch (e) { console.error("抓取失败", e); }
                };

                const renderChart = (apiData) => {
                    // 确保 DOM 容器存在
                    if (!chartRef.value) return;

                    // 仅在第一次初始化图表
                    if (!chartInstance.value) {
                        chartInstance.value = echarts.init(chartRef.value, 'dark');
                        window.addEventListener('resize', () => chartInstance.value.resize());
                    }

                    var holdAmounts = {};
                    var seriesData = apiData.map(fund => {
                        holdAmounts[fund.name] = fund.amount;
                        return {
                            name: fund.name,
                            type: 'line',
                            smooth: true,
                            symbol: 'none',
                            lineStyle: { width: 3, shadowColor: 'rgba(0,0,0,0.5)', shadowBlur: 10 },
                            endLabel: {
                                show: true, color: 'inherit', fontSize: 13, fontWeight: 'bold',
                                formatter: (p) => {
                                    let profit = (fund.amount * p.value[1] / 100).toFixed(2);
                                    return profit >= 0 ? `+${profit} 元` : `${profit} 元`;
                                }
                            },
                            data: fund.data
                        };
                    });

                    var d = new Date();
                    var todayStr = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');

                    var option = {
                        backgroundColor: 'transparent',
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(15, 23, 42, 0.9)', borderColor: '#334155', textStyle: { color: '#f8fafc' },
                            formatter: function (params) {
                                let html = `<div style="margin-bottom:5px;color:#94a3b8;">${params[0].axisValueLabel}</div>`;
                                params.forEach(p => {
                                    let profit = (holdAmounts[p.seriesName] * p.data[1] / 100).toFixed(2);
                                    let color = profit >= 0 ? '#ff4d4f' : '#10b981';
                                    html += `<div>${p.marker} ${p.seriesName}: <span style="color:${color};font-weight:bold;">${profit >= 0 ? '+' : ''}${profit} 元</span></div>`;
                                });
                                return html;
                            }
                        },
                        legend: { top: '0%', textStyle: { color: '#cbd5e1' } },
                        grid: { left: '3%', right: '15%', bottom: '3%', containLabel: true },
                        xAxis: { type: 'time', min: todayStr + ' 09:30:00', max: todayStr + ' 15:00:00', splitLine: { show: false } },
                        yAxis: { type: 'value', splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } } },
                        series: seriesData
                    };

                    // 【彻底解决闪烁的核心】：不传 true，让 ECharts 进行数据差异合并(Merge)！折线会像贪吃蛇一样丝滑延伸！
                    chartInstance.value.setOption(option);
                };

                const initDashboard = () => {
                    nextTick(() => { // 确保 Vue 渲染完大屏的 DOM 后再画图
                        fetchData();
                        timer = setInterval(fetchData, 60000); // 无感热抓取
                    });
                };

                // ========== 生命周期钩子 ==========
                onMounted(() => {
                    if (currentUser.value) {
                        isLoggedIn.value = true;
                        initDashboard();
                    }
                });

                onUnmounted(() => {
                    if (timer) clearInterval(timer);
                    if (chartInstance.value) chartInstance.value.dispose();
                });

                return {
                    isLoggedIn, currentUser, fundsList, chartRef, loginForm, fundForm,
                    handleRegister, handleLogin, handleLogout, handleAddFund, handleDeleteFund
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
